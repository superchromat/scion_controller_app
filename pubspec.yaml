name: SCION_Controller
description: A portable app for controlling the SCION device via OSC

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.9.1+29740952

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  file_picker: ^6.1.1
  share_plus: ^10.1.2
  intl: ^0.20.2
  crypto: ^3.0.3
  osc:
    path: /Users/joshreich/src/superchromat/osc/
  material_symbols_icons: ^4.2815.0
  shared_preferences: ^2.0.18
  flutter_typeahead: ^4.1.1
  nsd: ^4.0.2
  window_size: ^0.1.0
  image: ^4.7.2
  package_info_plus: ^9.0.1
  # Imported directly by lib/ (send_image.dart, osc_registry.dart) rather than
  # leaned on as transitive deps of image/flutter. Pinned, not `any`.
  archive: ^4.0.7
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

# Single source of truth for the app icon on every platform. Previously each
# platform's icons were dropped in by hand, so iOS/Android/web silently drifted
# to older artwork than macOS.
#
# The master is sc_app_icon.tiff in the repo root. app_icon.png below is
# GENERATED from it — edit the TIFF, never the PNG.
#
# To change the icon:
#   1. edit sc_app_icon.tiff               (the master; square, may have alpha)
#   2. dart run tool/flatten_icon.dart     (-> opaque 1024² assets/icon/app_icon.png)
#   3. dart run flutter_launcher_icons     (-> ios/android/web/windows/macos)
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  min_sdk_android: 21
  ios: true
  # iOS rejects icons with an alpha channel. The master is pre-flattened onto
  # black (see tool/flatten_icon.dart) so it is already opaque — do NOT use
  # remove_alpha_ios, whose compositing path draws a stray green rounded-rect
  # guide onto the artwork.
  remove_alpha_ios: false
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    # wherever it is redistributed, so it must be bundled (not just sit in the
    # repo). Surfaced in-app via LicenseRegistry — see lib/about.dart.
  fonts:
    # D-DIN — libre DIN 1451 interpretation (SIL Open Font License, see
    # assets/fonts/D-DIN-LICENSE.txt), used as a drop-in for FF DIN Pro to
    # sidestep FontFont/Monotype embedding-licence friction. Files are unmodified
    # (the OFL Reserved Font Name "D-DIN" only restricts modified redistributions).
    # The family is still named `DINPro` so every `fontFamily: 'DINPro'` reference
    # renders D-DIN with no code change. D-DIN sets ~8% tighter than FF DIN, so
    # GridTokens adds ~0.041em tracking (see GridTokens._dinTrack) to restore
    # FF DIN's fit.
    #
    # TWO weights only, deliberately. Registering Light/Medium as well let
    # stray w300/w500/w600 requests resolve to something, so the codebase
    # drifted to 8 weights. With only these two, anything else snaps to the
    # nearest of them and the type system stays honest. See GridTokens.
    - family: DINPro
      fonts:
        - asset: assets/fonts/D-DIN-Regular.otf
          weight: 400
        - asset: assets/fonts/D-DIN-Bold.otf
          weight: 700
